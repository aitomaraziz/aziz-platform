<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الكريستال برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link id="manifest-link" rel="manifest" href="">
    <meta name="theme-color" content="#003c78">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #fff;
        }
        .app-container {
            background: rgba(0, 60, 120, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 20px;
            width: 90%; max-width: 500px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); text-align: center;
        }
        .counter-container {
            background-color: #081b33; background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            border: 2px solid #00d2ff; border-radius: 15px; padding: 15px; margin-bottom: 15px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }
        .timer { font-size: 3rem; font-weight: bold; color: #00ffff; text-shadow: 0 0 15px #00ffff; font-family: monospace; direction: ltr;}
        .controls button, .radio-controls button, #installBtn {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); border: none; border-radius: 10px;
            color: white; padding: 10px 15px; font-size: 0.95rem; font-family: 'Cairo', sans-serif; cursor: pointer; margin: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s; width: 45%;
        }
        #installBtn { width: 93%; background: linear-gradient(135deg, #f5af19 0%, #f12711 100%); display: none; margin: 10px auto; font-weight: bold;}
        .controls button:disabled { background: #555; opacity: 0.6; }
        .radio-section { background: rgba(0, 0, 0, 0.4); border-radius: 15px; padding: 10px; margin: 15px 0; border: 1px solid rgba(0, 210, 255, 0.3); }
        select { background: rgba(0, 30, 60, 0.8); color: #00ffff; border: 1px solid #00d2ff; padding: 8px; border-radius: 8px; width: 90%; font-family: inherit; margin-bottom: 10px; }
        .library { max-height: 150px; overflow-y: auto; background: rgba(0, 0, 0, 0.3); padding: 10px; border-radius: 10px; text-align: right; }
        .track { background: rgba(255, 255, 255, 0.1); margin: 5px 0; padding: 10px; border-radius: 8px; border-right: 4px solid #00d2ff; font-size: 0.85rem;}
        .track audio { width: 100%; height: 30px; margin: 5px 0; }
        .track-links a { color: #00ffff; text-decoration: none; margin-left: 10px; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 5px;}
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #00d2ff; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="margin: 0 0 10px 0;">🎙️ الكريستال برو</h2>
    
    <button id="installBtn">📲 تثبيت التطبيق على الشاشة الرئيسية</button>

    <div class="counter-container">
        <div class="timer" id="display">00:00</div>
    </div>

    <div class="controls">
        <button id="startBtn">🔴 بدء التسجيل</button>
        <button id="stopBtn" disabled>⏹️ حفظ المقطع</button>
    </div>

    <div class="radio-section">
        <h4 style="margin: 5px 0;">📻 الراديو العالمي</h4>
        <select id="stationSelect">
            <option value="https://qurango.net/radio/tarateel">اذاعة القرءان الكريم</option>
             <option value="https://radio.alhuwayni.com/listen/alhuwayni/radio.mp3">اذاعة ابي اسحاق الحويني</option>
        </select>
        <div class="radio-controls">
            <button id="playRadio">▶️ تشغيل</button>
            <button id="pauseRadio">⏸️ إيقاف</button>
        </div>
        <audio id="mainRadio" style="display:none;"></audio>
    </div>

    <div class="library">
        <h4 style="margin: 0 0 5px 0;">📁 المكتبة الصوتية</h4>
        <div id="recordingsList"><p style="color: #aaa; font-size: 0.8rem;">لا توجد ملفات</p></div>
    </div>
</div>

<script>
    // --- تفعيل ميزة التثبيت كبرنامج PWA ---
    const manifest = {
        "name": "المسجل الكريستالي", "short_name": "الكريستال", "start_url": ".", "display": "standalone",
        "background_color": "#081b33", "theme_color": "#00d2ff",
        "icons": [{"src": "https://cdn-icons-png.flaticon.com/512/3669/3669483.png", "sizes": "512x512", "type": "image/png"}]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

    const swCode = `self.addEventListener('fetch', (e) => {});`;
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });
    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('installBtn').style.display = 'none';
        }
    });

    // --- وظائف الراديو والتسجيل (النسخة المتوافقة مع الهواتف) ---
    let mediaRecorder; let audioChunks = []; let startTime; let timerInterval; let currentStream;
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const display = document.getElementById('display');
    const radio = document.getElementById('mainRadio');
    const recordingsList = document.getElementById('recordingsList');

    document.getElementById('playRadio').addEventListener('click', () => {
        radio.src = document.getElementById('stationSelect').value;
        radio.play();
    });
    document.getElementById('pauseRadio').addEventListener('click', () => radio.pause());
    document.getElementById('stationSelect').addEventListener('change', () => { if (!radio.paused) { radio.src = document.getElementById('stationSelect').value; radio.play(); }});

    function updateTimer() {
        const diff = Date.now() - startTime;
        const m = Math.floor(diff / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        display.textContent = `${m}:${s}`;
    }

    startBtn.addEventListener('click', async () => {
        try {
            radio.pause(); 
            
            currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            let options = {};
            if (MediaRecorder.isTypeSupported('audio/webm')) {
                options = { mimeType: 'audio/webm' }; 
            } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
                options = { mimeType: 'audio/mp4' }; 
            }
            
            mediaRecorder = new MediaRecorder(currentStream, options);
            
            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                const audioType = mediaRecorder.mimeType || 'audio/webm';
                const blob = new Blob(audioChunks, { type: audioType });
                const fileName = prompt("أدخل اسماً لمقطعك:", "تسجيل_" + Math.floor(Math.random()*1000));
                
                if (fileName) {
                    const url = URL.createObjectURL(blob);
                    addTrackToLibrary(fileName, url, audioType);
                }
                
                currentStream.getTracks().forEach(track => track.stop());
            };

            audioChunks = []; 
            mediaRecorder.start(); 
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            startBtn.disabled = true; stopBtn.disabled = false; display.style.color = "#ff3333";
        } catch (err) {
            alert("حدث خطأ! تأكد أنك تستخدم رابط آمن (يبدأ بـ HTTPS) وأنك وافقت على صلاحية الميكروفون.");
            console.error(err);
        }
    });

    stopBtn.addEventListener('click', () => {
        mediaRecorder.stop(); clearInterval(timerInterval);
        display.textContent = "00:00"; display.style.color = "#00ffff";
        startBtn.disabled = false; stopBtn.disabled = true;
    });

    function addTrackToLibrary(name, url, type) {
        if (recordingsList.querySelector('p')) recordingsList.innerHTML = '';
        const div = document.createElement('div'); div.className = 'track';
        const waMsg = encodeURIComponent("استمع إلى هذا المقطع: " + name);
        
        const ext = type.includes('mp4') ? '.mp4' : '.webm';
        
        div.innerHTML = `
            <strong>${name}</strong>
            <audio src="${url}" controls></audio>
            <div class="track-links">
                <a href="${url}" target="_blank">🌐 رابط</a>
                <a href="${url}" download="${name}${ext}">💾 حفظ</a>
                <a href="https://wa.me/?text=${waMsg}" target="_blank">💬 واتساب</a>
            </div>
        `;
        recordingsList.prepend(div);
    }
</script>

</body>
</html>
