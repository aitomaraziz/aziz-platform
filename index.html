<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduRoom — الفصل الافتراضي</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN: Deep-space classroom — dark navy
   with electric cyan + warm gold accents.
   Fonts: IBM Plex Sans Arabic + JetBrains Mono
═══════════════════════════════════════════ */
:root{
  --bg:#070d1a;
  --bg2:#0c1526;
  --bg3:#111e35;
  --surface:#0f1d33;
  --surface2:#162440;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --cyan:#00d4ff;
  --cyan2:#0099cc;
  --cyan-glow:rgba(0,212,255,0.15);
  --gold:#f0b429;
  --gold-glow:rgba(240,180,41,0.15);
  --green:#00e676;
  --green-glow:rgba(0,230,118,0.15);
  --red:#ff3d5a;
  --red-glow:rgba(255,61,90,0.18);
  --purple:#a78bfa;
  --text:#dde4f0;
  --text2:#7a8fa8;
  --text3:#3d5470;
  --r:10px;
  --r2:16px;
  --shadow:0 8px 40px rgba(0,0,0,0.7);
  --font:'IBM Plex Sans Arabic',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea{font-family:var(--font);outline:none;border:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ════════════════════════════
   LOBBY / JOIN SCREEN
════════════════════════════ */
#lobby{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:100;
  overflow:hidden;
}
.lobby-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 800px 600px at 20% 50%, rgba(0,100,180,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 600px 500px at 80% 30%, rgba(0,180,150,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 60% 80%, rgba(100,50,200,0.07) 0%, transparent 70%);
  animation:bgshift 20s ease-in-out infinite alternate;
}
@keyframes bgshift{
  from{filter:hue-rotate(0deg)}
  to{filter:hue-rotate(30deg)}
}
.lobby-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:56px 56px;
}
.lobby-card{
  position:relative;z-index:1;
  width:min(520px,95vw);
  background:rgba(11,21,40,0.85);
  border:1px solid var(--border2);
  border-radius:24px;
  backdrop-filter:blur(30px) saturate(150%);
  padding:48px 44px 44px;
  box-shadow:var(--shadow),0 0 0 1px rgba(0,212,255,0.06),inset 0 1px 0 rgba(255,255,255,0.05);
  animation:fadein .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadein{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.brand-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 4px 20px rgba(0,212,255,0.35);
}
.brand-name{font-size:22px;font-weight:700;letter-spacing:-.01em}
.brand-name span{color:var(--cyan)}
.brand-tag{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  color:var(--gold);background:var(--gold-glow);
  border:1px solid rgba(240,180,41,0.25);
  padding:3px 8px;border-radius:5px;
}
.lobby-title{
  font-size:clamp(26px,6vw,38px);font-weight:700;
  line-height:1.1;letter-spacing:-.02em;margin-bottom:8px;
  background:linear-gradient(135deg,#dde4f0 0%,#6ea8d4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.lobby-sub{font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.6}

/* Role selector */
.role-row{display:flex;gap:10px;margin-bottom:24px}
.role-btn{
  flex:1;padding:14px 10px;
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:var(--r);
  color:var(--text2);
  font-size:13px;font-weight:600;
  transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.role-btn .role-emoji{font-size:22px}
.role-btn:hover{border-color:var(--border2);color:var(--text)}
.role-btn.selected{
  border-color:var(--cyan);
  background:var(--cyan-glow);
  color:var(--cyan);
  box-shadow:0 0 0 3px rgba(0,212,255,0.08);
}

.field-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  color:var(--cyan);margin-bottom:8px;display:block;
}
.field-input{
  width:100%;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r);
  padding:13px 16px;font-size:14px;color:var(--text);
  transition:border-color .2s,box-shadow .2s;margin-bottom:16px;
}
.field-input::placeholder{color:var(--text3)}
.field-input:focus{border-color:rgba(0,212,255,.4);box-shadow:0 0 0 3px rgba(0,212,255,.07)}

.room-row{display:flex;gap:10px;margin-bottom:24px}
.room-row .field-input{margin-bottom:0}
.btn-create{
  padding:13px 20px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--r);color:var(--text2);
  font-size:13px;font-weight:600;white-space:nowrap;
  transition:all .2s;
}
.btn-create:hover{background:var(--surface2);color:var(--text);border-color:var(--cyan)}

.btn-join{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  border-radius:var(--r);color:#070d1a;
  font-size:16px;font-weight:700;
  box-shadow:0 4px 24px rgba(0,212,255,.35);
  transition:all .2s;
}
.btn-join:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,212,255,.4)}
.btn-join:active{transform:translateY(0)}

#lobby-status{
  min-height:18px;margin-top:12px;
  font-family:var(--mono);font-size:12px;
  color:var(--red);letter-spacing:.02em;text-align:center;
}
#lobby-status.ok{color:var(--cyan)}

/* ════════════════════════════
   CLASSROOM SCREEN
════════════════════════════ */
#classroom{
  position:fixed;inset:0;
  display:grid;
  grid-template-rows:56px 1fr;
  grid-template-columns:1fr 320px;
  grid-template-areas:
    "header header"
    "stage  sidebar";
  background:var(--bg);
}

/* ── Top header bar ── */
.cls-header{
  grid-area:header;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  z-index:50;
}
.cls-brand{display:flex;align-items:center;gap:10px}
.cls-brand-icon{
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.cls-brand-name{font-size:14px;font-weight:700}
.cls-brand-name span{color:var(--cyan)}
.room-id-badge{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;
}
.room-id-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--text2)}
.room-id-val{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:500}
.btn-copy-room{
  background:none;border:none;color:var(--text2);padding:2px;
  display:flex;align-items:center;transition:color .2s;
}
.btn-copy-room:hover{color:var(--cyan)}
.btn-copy-room svg{width:13px;height:13px}
.header-right{display:flex;align-items:center;gap:12px}
.my-name-badge{
  font-size:13px;font-weight:600;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.my-role-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
}
.my-role-dot.teacher{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.timer-badge{
  font-family:var(--mono);font-size:12px;
  color:var(--text2);background:var(--surface);
  border:1px solid var(--border);border-radius:6px;
  padding:4px 10px;
}
.btn-leave{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;
  background:rgba(255,61,90,.15);border:1px solid rgba(255,61,90,.3);
  border-radius:8px;color:var(--red);font-size:13px;font-weight:600;
  transition:all .2s;
}
.btn-leave:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-leave svg{width:15px;height:15px}

/* ── Main stage ── */
.cls-stage{
  grid-area:stage;
  position:relative;
  display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

/* Screen share area */
#screen-area{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  overflow:hidden;
}
#screen-video{
  width:100%;height:100%;object-fit:contain;
  background:#000;
}
.screen-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:var(--text3);
  position:absolute;inset:0;
}
.screen-placeholder-icon{
  font-size:48px;opacity:.5;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.screen-placeholder p{font-size:15px;color:var(--text2)}
.screen-placeholder small{font-size:13px;color:var(--text3)}

/* Screen share active banner */
.share-banner{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);
  border-radius:40px;padding:7px 16px;
  font-size:13px;color:var(--green);
  z-index:20;backdrop-filter:blur(10px);
  animation:slidedown .3s ease;
}
@keyframes slidedown{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.share-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-stop-share{
  background:var(--green);color:#070d1a;border:none;
  border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;
  cursor:pointer;margin-right:4px;transition:opacity .2s;
}
.btn-stop-share:hover{opacity:.85}

/* Participants strip (bottom of stage) */
.participants-strip{
  display:flex;gap:8px;padding:10px 12px;
  background:var(--bg2);border-top:1px solid var(--border);
  overflow-x:auto;min-height:130px;align-items:center;
  flex-shrink:0;
}
.participant-tile{
  position:relative;flex-shrink:0;
  width:160px;height:108px;
  border-radius:12px;overflow:hidden;
  background:var(--surface);
  border:2px solid transparent;
  transition:border-color .2s,box-shadow .2s;
}
.participant-tile.speaking{
  border-color:var(--cyan);
  box-shadow:0 0 16px rgba(0,212,255,.3);
}
.participant-tile.teacher-tile{
  border-color:var(--gold);
  box-shadow:0 0 16px rgba(240,180,41,.2);
}
.participant-tile.me-tile{
  border-color:var(--purple);
  box-shadow:0 0 12px rgba(167,139,250,.2);
}
.tile-video{
  width:100%;height:100%;object-fit:cover;
  transform:scaleX(-1);
}
.tile-video.screen-tile{transform:none}
.tile-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(7,13,26,.85) 0%,transparent 50%);
}
.tile-name{
  position:absolute;bottom:7px;right:8px;left:8px;
  font-size:11px;font-weight:600;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
}
.tile-name-text{
  background:rgba(0,0,0,.4);padding:2px 7px;border-radius:5px;
  max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.tile-icons{display:flex;gap:4px}
.tile-icon{
  width:20px;height:20px;border-radius:5px;
  background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
}
.tile-icon svg{width:11px;height:11px}
.tile-icon.muted{background:rgba(255,61,90,.4);color:var(--red)}
.tile-icon.cam-off{background:rgba(255,61,90,.4);color:var(--red)}
.tile-role-badge{
  position:absolute;top:7px;right:7px;
  font-family:var(--mono);font-size:9px;letter-spacing:.06em;font-weight:600;
  padding:2px 6px;border-radius:4px;
}
.tile-role-badge.teacher{background:rgba(240,180,41,.25);color:var(--gold);border:1px solid rgba(240,180,41,.3)}
.tile-role-badge.student{background:rgba(0,212,255,.15);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.tile-video-off{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface2);
  font-size:28px;
}
/* No camera placeholder inside tile */
.tile-avatar{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;background:var(--surface2);
}
.tile-avatar-letter{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;
}

/* ── Sidebar ── */
.cls-sidebar{
  grid-area:sidebar;
  display:flex;flex-direction:column;
  background:var(--bg2);
  border-right:1px solid var(--border);
  overflow:hidden;
}

/* Sidebar tabs */
.sidebar-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.stab{
  flex:1;padding:13px 8px;
  background:none;border:none;
  font-size:12px;font-weight:600;
  color:var(--text2);
  border-bottom:2px solid transparent;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.stab:hover{color:var(--text);background:rgba(255,255,255,.02)}
.stab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.stab svg{width:14px;height:14px}
.stab-badge{
  background:var(--red);color:#fff;
  border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;
  min-width:18px;text-align:center;
}

/* ── Participants panel ── */
#panel-participants{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:6px;
}
.pl-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);transition:background .2s;
}
.pl-item:hover{background:var(--surface2)}
.pl-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.pl-info{flex:1;min-width:0}
.pl-name{font-size:13px;font-weight:600;color:var(--text);truncate:ellipsis}
.pl-role{font-size:11px;color:var(--text2);margin-top:1px}
.pl-icons{display:flex;gap:4px;align-items:center}
.pl-icon-btn{
  width:28px;height:28px;border-radius:7px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  transition:all .2s;cursor:pointer;
}
.pl-icon-btn svg{width:13px;height:13px}
.pl-icon-btn.on{background:rgba(255,61,90,.15);border-color:rgba(255,61,90,.3);color:var(--red)}
.pl-speaking-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 6px var(--cyan);
  animation:blink .8s infinite;
  flex-shrink:0;
}

/* ── Chat panel ── */
#panel-chat{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
.chat-messages{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:8px;
}
.chat-msg{
  display:flex;flex-direction:column;gap:3px;
  animation:msgIn .25s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.me{align-items:flex-end}
.chat-msg-header{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--text2);padding:0 4px;
}
.chat-msg.me .chat-msg-header{flex-direction:row-reverse}
.chat-msg-avatar{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;flex-shrink:0;
}
.chat-msg-name{font-weight:600;font-size:11px}
.chat-msg-time{font-family:var(--mono);font-size:10px;color:var(--text3)}
.chat-bubble{
  max-width:85%;padding:9px 13px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px 12px 4px 12px;
  font-size:13px;line-height:1.5;color:var(--text);
  word-break:break-word;
}
.chat-msg.me .chat-bubble{
  background:rgba(0,212,255,.12);
  border-color:rgba(0,212,255,.2);
  border-radius:12px 12px 12px 4px;
  color:var(--text);
}
.chat-msg.system .chat-bubble{
  background:rgba(255,255,255,.04);
  border-color:transparent;
  font-size:12px;color:var(--text2);
  text-align:center;width:100%;
  border-radius:8px;
}
.chat-input-area{
  padding:10px 12px 12px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.chat-input-row{display:flex;gap:8px}
.chat-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 13px;
  font-size:13px;color:var(--text);resize:none;
  max-height:80px;min-height:40px;
  transition:border-color .2s;
}
.chat-input::placeholder{color:var(--text3)}
.chat-input:focus{border-color:rgba(0,212,255,.4)}
.btn-send{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,212,255,.3);
  transition:all .2s;color:#070d1a;
}
.btn-send:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,212,255,.4)}
.btn-send svg{width:18px;height:18px}

/* ── Controls bar (bottom of stage) ── */
.cls-controls{
  position:absolute;bottom:148px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:6px;
  background:rgba(7,13,26,.85);
  border:1px solid rgba(255,255,255,.1);
  border-radius:50px;
  backdrop-filter:blur(28px) saturate(180%);
  padding:9px 16px;
  box-shadow:0 8px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);
  z-index:20;
}
.c-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  width:58px;height:58px;border-radius:50%;
  background:rgba(255,255,255,.05);
  border:1px solid transparent;
  color:var(--text);
  transition:all .2s;
}
.c-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);transform:translateY(-2px)}
.c-btn:active{transform:translateY(0)}
.c-btn.off{background:rgba(255,61,90,.18);border-color:rgba(255,61,90,.35);color:var(--red)}
.c-btn.sharing{background:rgba(0,230,118,.15);border-color:rgba(0,230,118,.35);color:var(--green)}
.c-btn svg{width:20px;height:20px}
.c-btn-label{font-size:9px;letter-spacing:.06em;font-weight:600;text-transform:uppercase;opacity:.7;color:inherit}
.c-divider{width:1px;height:36px;background:rgba(255,255,255,.1);margin:0 4px}
.c-btn-end{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  width:58px;height:58px;border-radius:50%;
  background:rgba(255,61,90,.2);border:1px solid rgba(255,61,90,.4);
  color:var(--red);transition:all .2s;
}
.c-btn-end:hover{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 4px 20px rgba(255,61,90,.5)}
.c-btn-end svg{width:20px;height:20px}
.c-btn-end-label{font-size:9px;letter-spacing:.06em;font-weight:600;text-transform:uppercase;opacity:.7;color:inherit}

/* Screen share btn only for teacher */
.screen-teacher-only{display:none}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:10px 20px;
  font-size:13px;color:var(--text);
  z-index:200;box-shadow:var(--shadow);
  animation:toastin .3s ease;pointer-events:none;
  white-space:nowrap;
}
.toast.err{border-color:rgba(255,61,90,.4);color:var(--red)}
.toast.ok{border-color:rgba(0,230,118,.4);color:var(--green)}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Responsive */
@media(max-width:900px){
  #classroom{
    grid-template-columns:1fr;
    grid-template-rows:56px 1fr 300px;
    grid-template-areas:"header""stage""sidebar";
  }
  .cls-sidebar{border-right:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

      <!-- Camera -->

    <!-- Participants video strip -->

  <!-- Sidebar -->

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script>
/**
 * ═══════════════════════════════════════════════════════════════
 *  EduRoom — Multi-Peer Classroom
 *
 *  Architecture:
 *  ─────────────────────────────────────────────────────────────
 *  This uses a "mesh" topology:
 *    • Every participant connects directly to every other participant
 *    • Each new joiner receives the room's participant list via a
 *      PeerJS Data Connection from the first peer they contact
 *    • Media (video/audio) flows peer-to-peer via MediaConnections
 *    • Chat & signaling flow via DataConnections
 *
 *  Room joining flow:
 *    1. User enters name + room ID
 *    2. App creates a Peer with ID = roomId + "_" + shortId
 *    3. If teacher: waits for students to connect
 *    4. If student: calls the "room host" peer (teacher's peer ID
 *       stored as roomId + "_host") to get the participant list
 *    5. Once list received, connects to ALL existing participants
 *
 *  Screen Share:
 *    • Teacher only can share screen
 *    • Screen track is sent to all connected peers via replaceTrack
 *    • A data message "screen:start"/"screen:stop" notifies peers
 *      to show/hide the screen area
 * ═══════════════════════════════════════════════════════════════
 */

// ─── State ──────────────────────────────────────────────────────
let myPeer        = null;   // PeerJS instance
let myId          = '';     // Our peer ID
let myName        = '';     // Display name
let myRole        = 'teacher'; // 'teacher' | 'student'
let roomId        = '';     // Room identifier
let localStream   = null;   // Camera+mic stream
let screenStream  = null;   // Screen share stream
let isMicMuted    = false;
let isCamOff      = false;
let isSharingScreen = false;

// Map of peerId → { name, role, mediaConn, dataConn, stream, isMuted, isCamOff }
const peers = new Map();

let sessionStart     = null;
let timerInterval    = null;
let unreadChat       = 0;
let currentTab       = 'participants';
let currentSharerId  = null; // peerId currently sharing screen

// Color palette for avatars
const COLORS = ['#00d4ff','#f0b429','#a78bfa','#00e676','#ff6b9d','#ff9f43','#54a0ff','#5f27cd'];
function getColor(name){ let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }

// ─── DOM ──────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const lobbyEl          = $('lobby');
const classroomEl      = $('classroom');
const inputName        = $('input-name');
const inputRoom        = $('input-room');
const lobbyStatus      = $('lobby-status');
const headerRoomId     = $('header-room-id');
const headerMyName     = $('header-my-name');
const myRoleDot        = $('my-role-dot');
const sessionTimerEl   = $('session-timer');
const participantsStrip= $('participants-strip');
const panelParticipants= $('panel-participants');
const chatMessages     = $('chat-messages');
const chatInput        = $('chat-input');
const chatBadge        = $('chat-badge');
const screenArea       = $('screen-area');
const screenVideo      = $('screen-video');
const screenPlaceholder= $('screen-placeholder');
const shareBanner      = $('share-banner');
const shareBannerText  = $('share-banner-text');
const btnMic           = $('btn-mic');
const btnCam           = $('btn-cam');
const btnScreen        = $('btn-screen');
const participantsCount= $('participants-count');

// ─── Role selection ───────────────────────────────────────────
function selectRole(r){
  myRole = r;
  $('role-teacher').classList.toggle('selected', r==='teacher');
  $('role-student').classList.toggle('selected', r==='student');
}

function generateRoomId(){
  inputRoom.value = 'room-' + Math.random().toString(36).substr(2,8).toUpperCase();
}

// ─── Join room ────────────────────────────────────────────────
async function joinRoom(){
  myName = inputName.value.trim();
  roomId = inputRoom.value.trim();
  if(!myName){ setStatus('أدخل اسمك أولاً','err'); return; }
  if(!roomId){ setStatus('أدخل معرّف الغرفة','err'); return; }

  setStatus('جاري الاتصال…','ok');

  try {
    // Get local media first
    localStream = await navigator.mediaDevices.getUserMedia({
      video:{ width:{ideal:640}, height:{ideal:480}, facingMode:'user' },
      audio:{ echoCancellation:true, noiseSuppression:true }
    });
  } catch(e){
    setStatus('تعذّر الوصول للكاميرا: '+e.message,'err'); return;
  }

  /**
   * Peer ID strategy:
   *   Teacher → roomId + "_host"    (well-known ID so students can find them)
   *   Students → roomId + "_" + random4
   * This lets students call the teacher first to get the room state.
   */
  const shortId = Math.random().toString(36).substr(2,4);
  myId = (myRole === 'teacher') ? roomId+'_host' : roomId+'_'+shortId;

  myPeer = new Peer(myId, { debug: 0 });

  myPeer.on('open', id => {
    setStatus('متصل ✓', 'ok');
    initClassroom();
    if(myRole === 'student') connectToTeacher();
  });

  myPeer.on('error', err => {
    const m = {
      'peer-unavailable':'المعرّف غير متصل — تحقق من الغرفة أو انتظر المعلم.',
      'network':'خطأ في الشبكة',
      'unavailable-id':'هذا الاسم مستخدم — حاول مرة أخرى'
    };
    setStatus(m[err.type]||'خطأ: '+err.message,'err');
    showToast(m[err.type]||'خطأ: '+err.message,'err');
  });

  /**
   * Handle incoming MEDIA connections (peer is calling us with their video)
   */
  myPeer.on('call', call => {
    call.answer(localStream); // Send back our stream
    call.on('stream', remoteStream => {
      const meta = call.metadata || {};
      addOrUpdatePeer(call.peer, meta.name||'مجهول', meta.role||'student', remoteStream, call);
    });
    call.on('close', () => removePeer(call.peer));
    call.on('error', () => removePeer(call.peer));
  });

  /**
   * Handle incoming DATA connections (for chat, signaling, room state)
   */
  myPeer.on('connection', conn => {
    setupDataConn(conn);
  });
}

// ─── Init classroom UI ────────────────────────────────────────
function initClassroom(){
  lobbyEl.classList.add('hidden');
  classroomEl.classList.remove('hidden');
  headerRoomId.textContent = roomId;
  headerMyName.textContent = myName;
  if(myRole === 'teacher'){
    myRoleDot.classList.add('teacher');
    btnScreen.parentElement === btnScreen.parentNode &&
      (btnScreen.style.display = 'flex');
    btnScreen.classList.remove('screen-teacher-only');
    // Show screen share button for teacher
    document.querySelectorAll('.screen-teacher-only').forEach(el => el.style.display = 'flex');
  }

  // Add self tile
  addSelfTile();
  updateParticipantsList();

  // Start session timer
  sessionStart = Date.now();
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now()-sessionStart)/1000);
    sessionTimerEl.textContent = pad(Math.floor(s/60))+':'+pad(s%60);
  }, 1000);

  addSystemMsg('أهلاً '+myName+'! دخلت الغرفة '+roomId);
}

// ─── Connect to teacher (students only) ──────────────────────
function connectToTeacher(){
  const teacherId = roomId+'_host';

  // Data connection to teacher first — to announce ourselves + get room state
  const dataConn = myPeer.connect(teacherId, {
    metadata:{ name:myName, role:myRole }
  });

  dataConn.on('open', () => {
    // Announce ourselves
    dataConn.send({ type:'hello', name:myName, role:myRole, id:myId });

    // Register this data connection
    if(!peers.has(teacherId)){
      peers.set(teacherId, { name:'المعلم', role:'teacher', dataConn, mediaConn:null, stream:null, isMuted:false, isCamOff:false });
    } else {
      peers.get(teacherId).dataConn = dataConn;
    }

    setupDataConn(dataConn);
    updateParticipantsList();
    addSystemMsg('تواصلت مع المعلم');
  });

  // Media call to teacher
  const mediaConn = myPeer.call(teacherId, localStream, {
    metadata:{ name:myName, role:myRole }
  });
  mediaConn.on('stream', remoteStream => {
    addOrUpdatePeer(teacherId, '...', 'teacher', remoteStream, mediaConn);
  });
  mediaConn.on('close', () => removePeer(teacherId));
}

// ─── Setup Data Connection (bidirectional messages) ───────────
function setupDataConn(conn){
  const peerId = conn.peer;

  conn.on('open', () => {
    if(!peers.has(peerId)){
      const meta = conn.metadata || {};
      peers.set(peerId, {
        name: meta.name||'مشارك', role: meta.role||'student',
        dataConn: conn, mediaConn:null, stream:null, isMuted:false, isCamOff:false
      });
    } else {
      peers.get(peerId).dataConn = conn;
    }
    updateParticipantsList();
  });

  conn.on('data', data => handleDataMessage(peerId, data));
  conn.on('close', () => removePeer(peerId));
  conn.on('error', () => removePeer(peerId));
}

// ─── Handle data messages ─────────────────────────────────────
function handleDataMessage(fromId, data){
  if(!data || !data.type) return;

  switch(data.type){

    // A new peer announced themselves
    case 'hello': {
      if(!peers.has(fromId)){
        peers.set(fromId, { name:data.name, role:data.role, dataConn:null, mediaConn:null, stream:null, isMuted:false, isCamOff:false });
      } else {
        const p = peers.get(fromId);
        p.name = data.name; p.role = data.role;
      }
      addSystemMsg(data.name+' دخل الغرفة');
      showToast(data.name+' انضم 👋','ok');

      // If I'm teacher, call this new student back with media
      if(myRole === 'teacher'){
        const mediaConn = myPeer.call(fromId, localStream, {
          metadata:{ name:myName, role:myRole }
        });
        mediaConn.on('stream', remoteStream => {
          addOrUpdatePeer(fromId, data.name, data.role, remoteStream, mediaConn);
        });
        mediaConn.on('close', () => removePeer(fromId));
        peers.get(fromId).mediaConn = mediaConn;
      }

      // Also send room state back so student knows existing peers
      const conn = peers.get(fromId)?.dataConn;
      if(conn && conn.open){
        const peerList = [];
        peers.forEach((p,id) => {
          if(id !== fromId) peerList.push({ id, name:p.name, role:p.role });
        });
        peerList.push({ id:myId, name:myName, role:myRole });
        conn.send({ type:'room-state', peers:peerList, sharer:currentSharerId });
      }
      updateParticipantsList();
      break;
    }

    // Teacher sends room state to new student
    case 'room-state': {
      data.peers.forEach(p => {
        if(p.id === myId) return;
        if(!peers.has(p.id)){
          peers.set(p.id, { name:p.name, role:p.role, dataConn:null, mediaConn:null, stream:null, isMuted:false, isCamOff:false });
        }
        // Connect to each existing peer
        if(p.id !== roomId+'_host'){ // already connected to teacher
          connectToPeer(p.id, p.name, p.role);
        }
      });
      // Restore screen share if active
      if(data.sharer && data.sharer !== myId){
        currentSharerId = data.sharer;
        showToast('المعلم يشارك شاشته 🖥️','ok');
      }
      updateParticipantsList();
      break;
    }

    // Chat message
    case 'chat': {
      const p = peers.get(fromId);
      const name = p?.name || data.name || 'مشارك';
      const role = p?.role || data.role || 'student';
      renderChatMsg(name, role, data.text, false, fromId);
      if(currentTab !== 'chat'){
        unreadChat++;
        chatBadge.textContent = unreadChat;
        chatBadge.classList.remove('hidden');
      }
      break;
    }

    // Peer mic state changed
    case 'mic-state': {
      const p = peers.get(fromId);
      if(p){ p.isMuted = data.muted; updateTile(fromId); updateParticipantsList(); }
      break;
    }

    // Peer cam state changed
    case 'cam-state': {
      const p = peers.get(fromId);
      if(p){ p.isCamOff = data.off; updateTile(fromId); updateParticipantsList(); }
      break;
    }

    // Screen share started
    case 'screen:start': {
      currentSharerId = fromId;
      const sharer = peers.get(fromId);
      showScreenArea(null, sharer?.name||'المعلم');
      showToast((sharer?.name||'المعلم')+' يشارك الشاشة 🖥️','ok');
      break;
    }

    // Screen share stopped
    case 'screen:stop': {
      currentSharerId = null;
      hideScreenArea();
      break;
    }

    // Broadcast to all (teacher relays to students)
    case 'broadcast': {
      handleDataMessage(data.from, data.payload);
      break;
    }
  }
}

// ─── Connect to a specific peer ───────────────────────────────
function connectToPeer(peerId, name, role){
  if(peerId === myId) return;

  // Data connection
  const dataConn = myPeer.connect(peerId, { metadata:{ name:myName, role:myRole } });
  dataConn.on('open', () => {
    dataConn.send({ type:'hello', name:myName, role:myRole, id:myId });
    if(peers.has(peerId)) peers.get(peerId).dataConn = dataConn;
    setupDataConn(dataConn);
  });

  // Media call
  const mediaConn = myPeer.call(peerId, localStream, {
    metadata:{ name:myName, role:myRole }
  });
  mediaConn.on('stream', remoteStream => {
    addOrUpdatePeer(peerId, name, role, remoteStream, mediaConn);
  });
  mediaConn.on('close', () => removePeer(peerId));
}

// ─── Add/update a peer's entry and video tile ─────────────────
function addOrUpdatePeer(id, name, role, stream, mediaConn){
  if(id === myId) return;
  if(!peers.has(id)){
    peers.set(id, { name, role, dataConn:null, mediaConn, stream, isMuted:false, isCamOff:false });
  } else {
    const p = peers.get(id);
    if(name && name !== '...' && name !== 'مجهول') p.name = name;
    p.role = role;
    p.stream = stream;
    p.mediaConn = mediaConn;
  }

  // If it's a screen share stream (from teacher), show in screen area
  if(id === currentSharerId && stream.getVideoTracks().length > 0){
    screenVideo.srcObject = stream;
  }

  renderTile(id);
  updateParticipantsList();
}

// ─── Remove peer ──────────────────────────────────────────────
function removePeer(id){
  if(!peers.has(id)) return;
  const p = peers.get(id);
  addSystemMsg((p.name||'مشارك')+' غادر الغرفة');
  showToast((p.name||'مشارك')+' غادر 👋','');
  peers.delete(id);

  // Remove tile
  const tile = document.getElementById('tile-'+id);
  if(tile) tile.remove();

  if(id === currentSharerId){ currentSharerId=null; hideScreenArea(); }
  updateParticipantsList();
}

// ─── Broadcast message to all peers ──────────────────────────
function broadcast(data){
  peers.forEach((p, id) => {
    if(p.dataConn && p.dataConn.open){
      p.dataConn.send(data);
    }
  });
}

// ─── Mic toggle ───────────────────────────────────────────────
function toggleMic(){
  isMicMuted = !isMicMuted;
  localStream?.getAudioTracks().forEach(t => { t.enabled = !isMicMuted; });
  btnMic.classList.toggle('off', isMicMuted);
  btnMic.querySelector('.icon-on').classList.toggle('hidden', isMicMuted);
  btnMic.querySelector('.icon-off').classList.toggle('hidden', !isMicMuted);
  // Notify peers
  broadcast({ type:'mic-state', muted:isMicMuted });
  updateSelfTile();
}

// ─── Camera toggle ────────────────────────────────────────────
function toggleCam(){
  isCamOff = !isCamOff;
  localStream?.getVideoTracks().forEach(t => { t.enabled = !isCamOff; });
  btnCam.classList.toggle('off', isCamOff);
  btnCam.querySelector('.icon-on').classList.toggle('hidden', isCamOff);
  btnCam.querySelector('.icon-off').classList.toggle('hidden', !isCamOff);
  broadcast({ type:'cam-state', off:isCamOff });
  updateSelfTile();
}

// ─── Screen Share ────────────────────────────────────────────
/**
 * Screen sharing flow:
 * 1. Call getDisplayMedia() to get screen stream
 * 2. Replace the video track in ALL peer connections
 * 3. Broadcast 'screen:start' so everyone shows the screen area
 * 4. When screen stream ends (user clicks browser stop), revert
 */
async function toggleScreenShare(){
  if(isSharingScreen){ await stopScreenShare(); return; }

  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video:{ cursor:'always', displaySurface:'monitor' },
      audio:false
    });

    const screenTrack = screenStream.getVideoTracks()[0];

    // Replace video track for all connected peers
    peers.forEach(p => {
      if(p.mediaConn && p.mediaConn.peerConnection){
        const sender = p.mediaConn.peerConnection.getSenders()
          .find(s => s.track && s.track.kind === 'video');
        if(sender) sender.replaceTrack(screenTrack);
      }
    });

    // When user clicks browser's "Stop sharing" button
    screenTrack.onended = () => stopScreenShare();

    isSharingScreen = true;
    currentSharerId = myId;

    // Show screen in our own screen area
    screenVideo.srcObject = screenStream;
    showScreenArea(screenStream, myName);
    shareBanner.classList.remove('hidden');
    shareBannerText.textContent = 'أنت تشارك شاشتك';

    btnScreen.classList.add('sharing');
    btnScreen.querySelector('.icon-on').classList.toggle('hidden', true);
    btnScreen.querySelector('.icon-off').classList.toggle('hidden', false);

    // Notify all peers
    broadcast({ type:'screen:start', name:myName });
    showToast('بدأت مشاركة الشاشة 🖥️','ok');

  } catch(e){
    if(e.name !== 'NotAllowedError')
      showToast('خطأ في مشاركة الشاشة: '+e.message,'err');
  }
}

async function stopScreenShare(){
  if(!isSharingScreen) return;
  screenStream?.getTracks().forEach(t => t.stop());
  screenStream = null;
  isSharingScreen = false;
  currentSharerId = null;

  // Restore camera track for all peers
  if(localStream){
    const camTrack = localStream.getVideoTracks()[0];
    peers.forEach(p => {
      if(p.mediaConn && p.mediaConn.peerConnection && camTrack){
        const sender = p.mediaConn.peerConnection.getSenders()
          .find(s => s.track && s.track.kind === 'video');
        if(sender) sender.replaceTrack(camTrack);
      }
    });
  }

  hideScreenArea();
  shareBanner.classList.add('hidden');
  btnScreen.classList.remove('sharing');
  btnScreen.querySelector('.icon-on').classList.toggle('hidden', false);
  btnScreen.querySelector('.icon-off').classList.toggle('hidden', true);

  broadcast({ type:'screen:stop' });
  showToast('أوقفت مشاركة الشاشة','');
}

function showScreenArea(stream, sharerName){
  if(stream) screenVideo.srcObject = stream;
  screenVideo.classList.remove('hidden');
  screenPlaceholder.classList.add('hidden');
}
function hideScreenArea(){
  screenVideo.srcObject = null;
  screenVideo.classList.add('hidden');
  screenPlaceholder.classList.remove('hidden');
}

// ─── Video tiles ─────────────────────────────────────────────
function addSelfTile(){
  const id = 'self';
  let tile = document.getElementById('tile-self');
  if(!tile){
    tile = document.createElement('div');
    tile.id = 'tile-self';
    tile.className = 'participant-tile me-tile';
    participantsStrip.prepend(tile);
  }
  tile.innerHTML = buildTileHTML('self', myName, myRole, true);
  const vid = tile.querySelector('.tile-video');
  if(vid && localStream) vid.srcObject = localStream;
}

function updateSelfTile(){
  const tile = document.getElementById('tile-self');
  if(!tile) return;
  // Update icons
  const micIcon = tile.querySelector('.mic-icon');
  const camIcon = tile.querySelector('.cam-icon');
  if(micIcon) micIcon.className = 'tile-icon '+(isMicMuted?'muted':'');
  if(camIcon) camIcon.className = 'tile-icon '+(isCamOff?'cam-off':'');
  // Camera off overlay
  let overlay = tile.querySelector('.tile-avatar');
  if(isCamOff){
    if(!overlay){
      overlay = document.createElement('div');
      overlay.className = 'tile-avatar';
      overlay.innerHTML = `<div class="tile-avatar-letter" style="background:${getColor(myName)}">${myName[0]}</div>`;
      tile.appendChild(overlay);
    }
  } else {
    if(overlay) overlay.remove();
  }
}

function renderTile(id){
  const p = peers.get(id);
  if(!p) return;
  let tile = document.getElementById('tile-'+id);
  if(!tile){
    tile = document.createElement('div');
    tile.id = 'tile-'+id;
    tile.className = 'participant-tile '+(p.role==='teacher'?'teacher-tile':'');
    participantsStrip.appendChild(tile);
  }
  tile.innerHTML = buildTileHTML(id, p.name, p.role, false, p.isMuted, p.isCamOff);
  if(p.stream){
    const vid = tile.querySelector('.tile-video');
    if(vid) vid.srcObject = p.stream;
  }
}

function updateTile(id){
  const p = peers.get(id);
  if(!p) return;
  renderTile(id);
}

function buildTileHTML(id, name, role, isMe, muted=false, camOff=false){
  const color = getColor(name);
  const initial = name ? name[0] : '?';
  const roleBadge = role==='teacher'
    ? `<div class="tile-role-badge teacher">معلم</div>`
    : `<div class="tile-role-badge student">طالب</div>`;
  const avatarStyle = camOff
    ? `<div class="tile-avatar"><div class="tile-avatar-letter" style="background:${color}">${initial}</div></div>`
    : '';

  return `
    <video class="tile-video ${camOff?'hidden':''}" autoplay playsinline ${isMe?'muted':''}></video>
    ${avatarStyle}
    <div class="tile-overlay"></div>
    ${roleBadge}
    <div class="tile-name">
      <span class="tile-name-text">${isMe ? 'أنت' : name}</span>
      <div class="tile-icons">
        <div class="tile-icon mic-icon ${muted?'muted':''}" title="${muted?'مكتوم':'مفعّل'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            ${muted
              ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><path d="M17 16.95A7 7 0 0 1 5 12v-2"/>'
              : '<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/>'}
          </svg>
        </div>
        <div class="tile-icon cam-icon ${camOff?'cam-off':''}" title="${camOff?'كاميرا مغلقة':'كاميرا مفعّلة'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            ${camOff
              ? '<path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"/><line x1="1" y1="1" x2="23" y2="23"/>'
              : '<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>'}
          </svg>
        </div>
      </div>
    </div>`;
}

// ─── Chat ─────────────────────────────────────────────────────
function chatKeydown(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); }
}

function sendChat(){
  const text = chatInput.value.trim();
  if(!text) return;
  chatInput.value = '';
  chatInput.style.height = 'auto';

  // Render locally
  renderChatMsg(myName, myRole, text, true, myId);

  // Broadcast to all peers
  broadcast({ type:'chat', name:myName, role:myRole, text });
}

function renderChatMsg(name, role, text, isMe, fromId){
  const color = getColor(name);
  const initial = name ? name[0] : '?';
  const now = new Date();
  const time = pad(now.getHours())+':'+pad(now.getMinutes());

  const div = document.createElement('div');
  div.className = 'chat-msg'+(isMe?' me':'');

  if(isMe){
    div.innerHTML = `
      <div class="chat-msg-header">
        <div class="chat-msg-avatar" style="background:${color}">${initial}</div>
        <span class="chat-msg-name">أنت</span>
        <span class="chat-msg-time">${time}</span>
      </div>
      <div class="chat-bubble">${escHtml(text)}</div>`;
  } else {
    div.innerHTML = `
      <div class="chat-msg-header">
        <div class="chat-msg-avatar" style="background:${color}">${initial}</div>
        <span class="chat-msg-name">${escHtml(name)}</span>
        <span class="chat-msg-time">${time}</span>
      </div>
      <div class="chat-bubble">${escHtml(text)}</div>`;
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addSystemMsg(text){
  const div = document.createElement('div');
  div.className = 'chat-msg system';
  div.innerHTML = `<div class="chat-bubble">— ${escHtml(text)} —</div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ─── Sidebar tabs ─────────────────────────────────────────────
function switchTab(tab){
  currentTab = tab;
  $('tab-participants').classList.toggle('active', tab==='participants');
  $('tab-chat').classList.toggle('active', tab==='chat');
  $('panel-participants').classList.toggle('hidden', tab!=='participants');
  $('panel-chat').classList.toggle('hidden', tab!=='chat');
  if(tab === 'chat'){
    unreadChat = 0;
    chatBadge.classList.add('hidden');
    chatMessages.scrollTop = chatMessages.scrollHeight;
    setTimeout(() => chatInput.focus(), 100);
  }
}

// ─── Leave room ───────────────────────────────────────────────
function leaveRoom(){
  clearInterval(timerInterval);
  broadcast({ type:'chat', name:myName, role:myRole, text:'[غادر الغرفة]' });
  localStream?.getTracks().forEach(t => t.stop());
  screenStream?.getTracks().forEach(t => t.stop());
  myPeer?.destroy();
  peers.clear();
  classroomEl.classList.add('hidden');
  lobbyEl.classList.remove('hidden');
  participantsStrip.innerHTML = '';
  panelParticipants.innerHTML = '';

// ─── Helpers ──────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function escHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let toastTimer=null;
function showToast(msg, type=''){
  const t=$('toast');
  t.textContent=msg;
  t.className='toast'+(type?' '+type:'');
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.add('hidden'),3200);
}

function setStatus(msg, type=''){
  lobbyStatus.textContent=msg;
  lobbyStatus.className=type==='ok'?'ok':type==='err'?'':'';
}

// Auto-resize textarea
chatInput.addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,80)+'px';
});

document.addEventListener('DOMContentLoaded',()=>{
  if(myRole!=='teacher'){
    document.querySelectorAll('.screen-teacher-only').forEach(el=>el.style.display='none');
  }
});
