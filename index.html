<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>EduRoom Pro — نظام الإدارة الذكي</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root { --primary: #3b82f6; --bg: #060d1c; --card: #111827; }
  body { margin:0; font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: white; overflow: hidden; }
  .hidden { display: none !important; }
  
  /* UI Elements */
  .lobby-container { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: var(--card); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
  input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #374151; background: #1f2937; color: white; box-sizing: border-box; }
  button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
  
  /* Admin Panel */
  #admin-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; padding: 20px; overflow-y: auto; }
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .user-item { background: #1f2937; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; font-size: 0.8rem; }
  
  /* Toast */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; padding: 10px 20px; border-radius: 5px; z-index: 1000; transition: 0.3s; }
  
  /* Room Info Bar */
  .room-info { background: #1e293b; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div id="toast" class="hidden"></div>

<div id="lobby" class="lobby-container">
  <div class="card">
    <h2 onclick="openAdminCheck()" style="cursor:pointer; text-align:center; margin-bottom:20px;">EduRoom <span style="font-size:0.7rem; color:var(--primary)">v4 Pro</span></h2>
    
    <label>أنا:</label>
    <select id="role" onchange="toggleFields()">
      <option value="student">تلميذ</option>
      <option value="host">أستاذ</option>
    </select>

    <input type="text" id="u-name" placeholder="اسم المستخدم (التسجيل)">
    <input type="password" id="u-pass" placeholder="كلمة المرور">
    
    <div id="student-only-fields">
      <input type="text" id="r-id" placeholder="معرّف الغرفة (من الأستاذ)">
    </div>

    <button onclick="login()">دخول الغرفة</button>
    <p style="font-size: 0.7rem; color: #6b7280; margin-top: 15px; text-align: center;">ملاحظة: الإدارة فقط هي من تمنح حسابات الدخول.</p>
  </div>
</div>

<div id="admin-panel" class="hidden">
  <div style="max-width: 600px; margin: 0 auto;">
    <div style="display:flex; justify-content: space-between; align-items:center;">
      <h3>لوحة الإدارة - تسجيل المستخدمين</h3>
      <button onclick="$('admin-panel').classList.add('hidden')" style="width:auto; padding:5px 15px; background:#4b5563;">إغلاق</button>
    </div>
    <hr style="border-color:#374151">
    
    <div class="admin-grid">
      <div>
        <h4>إضافة مستخدم</h4>
        <input type="text" id="adm-user" placeholder="اسم المستخدم">
        <input type="text" id="adm-pass" placeholder="كلمة المرور">
        <select id="adm-role">
          <option value="host">أستاذ</option>
          <option value="student">تلميذ</option>
        </select>
        <button onclick="addUser()">حفظ المستخدم</button>
      </div>
      <div>
        <h4>قائمة المسجلين</h4>
        <div id="users-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="cls" class="hidden" style="height:100vh; display:flex; flex-direction:column;">
  <div class="room-info">
    <div>مرحباً: <span id="display-name" style="font-weight:bold; color:var(--primary)"></span></div>
    <div id="room-display-area" class="hidden">
      معرف الغرفة: <code id="room-code" style="background:#000; padding:3px 8px; border-radius:4px; color:#10b981"></code>
      <button onclick="copyID()" style="width:auto; display:inline; margin:0 5px; padding:2px 10px; font-size:0.7rem;">نسخ</button>
    </div>
    <button onclick="location.reload()" style="width:auto; background:#ef4444; padding:5px 15px;">خروج</button>
  </div>
  <div style="flex:1; display:flex; align-items:center; justify-content:center; background:#000;">
    <p id="status-msg">جاري الاتصال بالشبكة...</p>
    <div id="video-grid"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let db = JSON.parse(localStorage.getItem('edu_db') || '{"users":[]}');
let myData = null;
let clickCount = 0;

// --- Admin Logic ---
function openAdminCheck() {
    clickCount++;
    // تفتح اللوحة بعد 5 نقرات متتالية على عنوان EduRoom
    if(clickCount >= 5) {
        let p = prompt("أدخل كلمة مرور الإدارة الجديدة:");
        // تم تغيير كلمة المرور هنا إلى AZIZ2026
        if(p === "AZIZ2026") {
            $('admin-panel').classList.remove('hidden');
            renderUsers();
            showToast("تم الدخول بصلاحيات الإدارة", "ok");
        } else if (p !== null) {
            showToast("كلمة المرور خاطئة!");
        }
        clickCount = 0;
    }
}

function addUser() {
    const user = $('adm-user').value.trim();
    const pass = $('adm-pass').value.trim();
    const role = $('adm-role').value;
    if(!user || !pass) return alert("اكمل البيانات");
    db.users.push({user, pass, role});
    localStorage.setItem('edu_db', JSON.stringify(db));
    renderUsers();
    $('adm-user').value = ''; $('adm-pass').value = '';
}

function renderUsers() {
    $('users-list').innerHTML = db.users.map((u, i) => `
        <div class="user-item">
            <span>${u.role==='host'?'👨‍🏫':'🎓'} ${u.user} (${u.pass})</span>
            <button onclick="deleteUser(${i})" style="width:auto; background:red; margin:0; padding:2px 5px;">حذف</button>
        </div>
    `).join('');
}

function deleteUser(i) {
    db.users.splice(i, 1);
    localStorage.setItem('edu_db', JSON.stringify(db));
    renderUsers();
}

// --- App Logic ---
function toggleFields() {
    $('student-only-fields').classList.toggle('hidden', $('role').value === 'host');
}

function login() {
    const user = $('u-name').value.trim();
    const pass = $('u-pass').value.trim();
    const role = $('role').value;
    const room = $('r-id').value.trim();

    // 1. التحقق من الهوية في قاعدة البيانات
    const found = db.users.find(u => u.user === user && u.pass === pass && u.role === role);
    
    if(!found) {
        return showToast("بيانات الدخول غير صحيحة أو غير مسجلة لدى الإدارة");
    }

    myData = found;

    if(role === 'host') {
        // الأستاذ: يتم توليد معرف الغرفة من اسمه (لجعل المعرف ثابت وسهل)
        startRoom(user + "_room"); 
    } else {
        // التلميذ: يجب أن يدخل معرف الغرفة الذي أرسله الأستاذ
        if(!room) return showToast("يرجى إدخال معرف الغرفة المستلم من الأستاذ");
        startRoom(room);
    }
}

function startRoom(roomID) {
    $('lobby').classList.add('hidden');
    $('cls').classList.remove('hidden');
    $('display-name').textContent = myData.user;
    
    if(myData.role === 'host') {
        $('room-display-area').classList.remove('hidden');
        $('room-code').textContent = roomID;
    }

    // هنا يتم ربط مكتبة PeerJS (تم تبسيطها للعرض)
    $('status-msg').textContent = `متصل الآن في الغرفة: ${roomID}`;
    initPeerConnection(roomID);
}

function initPeerConnection(roomID) {
    const peerPrefix = myData.role === 'host' ? '_host' : '_std_' + Math.random().toString(36).substr(2,4);
    const peer = new Peer(roomID + peerPrefix);
    
    peer.on('open', id => {
        console.log("My Peer ID:", id);
        showToast("تم تفعيل نظام الاتصال المباشر", "ok");
    });

    peer.on('error', err => {
        if(err.type === 'unavailable-id') {
            showToast("هذه الغرفة مفتوحة بالفعل من قبل الأستاذ");
            setTimeout(()=>location.reload(), 2000);
        }
    });
}

function copyID() {
    const code = $('room-code').textContent;
    navigator.clipboard.writeText(code);
    showToast("تم نسخ المعرف بنجاح", "ok");
}

function showToast(m, type="") {
    const t = $('toast');
    t.textContent = m;
    t.style.background = type === "ok" ? "#10b981" : "#ef4444";
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
}

toggleFields(); // Initial state
</script>
</body>
</html>
