<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>منصة عزيز للتعليم عن بعد - آمنة</title>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #05070a;
      --surface: #0e1420;
      --teal: #00e5c3;
      --red: #ff4757;
      --text: #e8edf5;
      --glass: rgba(14, 20, 32, 0.8);
    }

    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
    .hidden { display: none !important; }

    /* --- واجهة الدردشة الجديدة --- */
    .chat-panel {
      position: absolute; left: 20px; top: 80px; bottom: 120px;
      width: 300px; background: var(--glass);
      backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px; display: flex; flex-direction: column; z-index: 50;
      transition: all 0.3s ease;
    }
    .chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
    .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
    .msg.me { background: var(--teal); color: #000; align-self: flex-start; margin-right: auto; }
    .msg.remote { background: var(--surface); color: #fff; align-self: flex-end; margin-left: auto; }
    .chat-input-area { padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 5px; }
    .chat-input { flex: 1; background: #000; border: 1px solid var(--teal); border-radius: 5px; color: #fff; padding: 5px 10px; outline: none; }

    /* --- طبقة الحماية (كلمة السر) --- */
    .security-badge { position: absolute; top: 20px; right: 20px; background: rgba(0,229,195,0.1); border: 1px solid var(--teal); padding: 5px 15px; border-radius: 20px; font-size: 12px; color: var(--teal); z-index: 100; }

    /* نفس تنسيقات الفيديو السابقة مع تحسينات */
    .lobby-card { background: var(--surface); padding: 40px; border-radius: 20px; width: 400px; margin: 100px auto; text-align: center; border: 1px solid var(--teal); }
    .call-screen { position: fixed; inset: 0; background: #000; }
    .remote-video { width: 100%; height: 100%; object-fit: cover; }
    .pip-window { position: absolute; bottom: 120px; right: 20px; width: 200px; height: 150px; border: 2px solid var(--teal); border-radius: 15px; overflow: hidden; }
    .control-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: var(--glass); padding: 15px 30px; border-radius: 50px; }
    .btn { padding: 10px 20px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; }
    .btn-call { background: var(--teal); color: #000; width: 100%; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="security-badge">🔒 اتصال مشفر E2EE</div>

  <div id="lobby">
    <div class="lobby-card">
      <h2 style="color: var(--teal)">منصة عزيز للتعليم</h2>
      <p>معرف الجلسة الخاص بك:</p>
      <div style="background: #000; padding: 10px; margin: 10px 0; font-family: monospace; border: 1px dashed var(--teal)" id="my-id">...</div>
      
      <input type="text" id="remote-id" placeholder="أدخل معرف الطالب/المعلم" style="width: 100%; padding: 10px; margin-bottom: 10px;">
      <input type="password" id="room-pass" placeholder="كلمة سر الجلسة (اختياري)" style="width: 100%; padding: 10px;">
      
      <button class="btn btn-call" onclick="startCall()">بدء الاتصال الآمن</button>
    </div>
  </div>

  <div id="call-screen" class="hidden">
    <video id="remote-video" class="remote-video" autoplay></video>
    
    <div class="pip-window">
      <video id="local-video" style="width:100%; height:100%; object-fit:cover" autoplay muted></video>
    </div>

    <div class="chat-panel" id="chat-panel">
      <div style="padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; font-size: 14px;">الدردشة المباشرة</div>
      <div class="chat-messages" id="chat-msgs"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="اكتب رسالة...">
        <button onclick="sendMsg()" style="background: var(--teal); border: none; border-radius: 5px; cursor: pointer;">📩</button>
      </div>
    </div>

    <div class="control-bar">
      <button class="btn" onclick="toggleAudio()">🎤</button>
      <button class="btn" onclick="toggleVideo()">📷</button>
      <button class="btn" style="background: var(--red); color: white;" onclick="location.reload()">إنهاء</button>
    </div>
  </div>

  <script>
    let peer, localStream, currentConn;
    const myIdDisplay = document.getElementById('my-id');
    const chatMsgs = document.getElementById('chat-msgs');
    const chatInput = document.getElementById('chat-input');

    // 1. إعداد الاتصال مع مفتاح حماية عشوائي
    peer = new Peer(null, { debug: 1 });

    peer.on('open', id => myIdDisplay.textContent = id);

    // استقبال المكالمات والرسائل
    peer.on('call', call => {
      call.answer(localStream);
      setupVideo(call);
    });

    peer.on('connection', conn => {
      currentConn = conn;
      setupChat(conn);
    });

    async function initMedia() {
      localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
      document.getElementById('local-video').srcObject = localStream;
    }

    // 2. بدء الاتصال (فيديو + بيانات)
    function startCall() {
      const remoteId = document.getElementById('remote-id').value;
      const pass = document.getElementById('room-pass').value;

      if(!remoteId) return alert("أدخل المعرف أولاً");

      // إنشاء اتصال بيانات للدردشة
      const conn = peer.connect(remoteId, { metadata: { password: pass } });
      currentConn = conn;
      setupChat(conn);

      // إنشاء اتصال فيديو
      const call = peer.call(remoteId, localStream);
      setupVideo(call);
    }

    function setupVideo(call) {
      call.on('stream', stream => {
        document.getElementById('remote-video').srcObject = stream;
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('call-screen').classList.remove('hidden');
      });
    }

    function setupChat(conn) {
      conn.on('data', data => {
        appendMsg(data, 'remote');
      });
    }

    function sendMsg() {
      const msg = chatInput.value;
      if(!msg || !currentConn) return;
      currentConn.send(msg);
      appendMsg(msg, 'me');
      chatInput.value = '';
    }

    function appendMsg(msg, type) {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = msg;
      chatMsgs.appendChild(div);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }

    // التحكم في الميديا
    function toggleAudio() { 
      const state = localStream.getAudioTracks()[0].enabled;
      localStream.getAudioTracks()[0].enabled = !state;
    }
    function toggleVideo() { 
      const state = localStream.getVideoTracks()[0].enabled;
      localStream.getVideoTracks()[0].enabled = !state;
    }

    initMedia();

    // إرسال بالضغط على Enter
    chatInput.onkeydown = (e) => { if(e.key === 'Enter') sendMsg(); };
  </script>
</body>
</html>
